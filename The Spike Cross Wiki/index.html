<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spike Cross - Wiki Database</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>THE SPIKE CROSS <span>DATABASE</span></h1>
        
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchBar" placeholder="Pesquise o nome do jogador..." onkeyup="filterPlayers()">
            </div>
            
            <div class="filters-box">
                <select id="filterPosition" onchange="filterPlayers()">
                    <option value="ALL">Todas as Posições</option>
                    <option value="MB">MB (Middle Blocker)</option>
                    <option value="SE">SE (Setter)</option>
                    <option value="WS">WS (Wing Spiker)</option>
                </select>

                <select id="filterRank" onchange="filterPlayers()">
                    <option value="ALL">Todos os Ranks</option>
                    <option value="S-">S-</option>
                    <option value="S">S</option>
                    <option value="S+">S+</option>
                </select>
            </div>
        </div>
    </header>

    <main id="playerGrid" class="player-grid"></main>

    <div id="detailsModal" class="details-overlay" onclick="closeDetailsModal(event)">
        <div class="details-content">
            <button class="close-modal-btn" onclick="forceCloseDetailsModal()">×</button>
            <div id="detailsBody"></div>
        </div>
    </div>

    <div id="statusModal" class="status-modal-overlay" onclick="closeStatusModal(event)">
        <img id="statusImgExpanded" class="status-modal-content">
    </div>

    <footer>
        <p>&copy; 2026 The Spike Cross Wiki - Todos os direitos reservados.</p>
        <p>Proibida a reprodução total ou parcial do conteúdo e das artes.</p>
    </footer>

    <script src="script.js"></script>

    <script>
        // Bloqueia o clique direito
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        // Bloqueia atalhos de inspeção
        document.onkeydown = function(e) {
            if(e.keyCode == 123) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
        }
    </script>
</body>
</html>
